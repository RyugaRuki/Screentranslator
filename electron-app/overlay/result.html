<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Noto Sans CJK JP', sans-serif;
    background: rgba(8, 12, 28, 0.78);
    border: 1px solid rgba(255, 215, 0, 0.28);
    border-radius: 10px;
    overflow: hidden;
    height: 100vh;
  }

  .content {
    height: 100%;
    width: 100%;
    padding: 14px;
    overflow-y: auto;
  }

  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.25); border-radius: 3px; }

  :root {
    --result-font-size: 31px;
  }

  .translated-text {
    font-size: var(--result-font-size);
    line-height: 1.7;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.08);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .status-text {
    font-size: 14px;
    line-height: 1.6;
    color: #9ca7d1;
  }

  .error-text {
    font-size: 14px;
    line-height: 1.6;
    color: #ffb0b0;
  }
</style>
</head>
<body>
  <div class="content" id="content">
    <div class="status-text" id="status-text">Dang cho ban dich...</div>
  </div>

<script>
const { ipcRenderer } = require('electron');
const content = document.getElementById('content');

ipcRenderer.on('apply-preferences', (event, preferences) => {
  const fontSize = Number(preferences?.resultFontSize || 31);
  document.documentElement.style.setProperty('--result-font-size', `${fontSize}px`);
});

ipcRenderer.on('show-result', (event, data) => {
  if (data.status === 'loading') {
    content.innerHTML = '<div class="status-text">Dang nhan dien va dich...</div>';
    return;
  }

  if (data.status === 'error' || (data.errorMessage && !data.translatedText)) {
    const message = data.message || data.errorMessage || 'Da xay ra loi.';
    content.innerHTML = `<div class="error-text">${escapeHtml(message)}</div>`;
    return;
  }

  const translated = data.translatedText || '';
  if (!translated.trim()) {
    content.innerHTML = '<div class="status-text">Khong co noi dung de hien thi.</div>';
    return;
  }

  content.innerHTML = `<div class="translated-text">${escapeHtml(translated)}</div>`;
});

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}
</script>
</body>
</html>
