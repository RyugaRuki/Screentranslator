<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Noto Sans CJK JP', sans-serif;
    background: rgba(10, 12, 26, 0.96);
    border: 1px solid rgba(255, 215, 0, 0.25);
    border-radius: 12px;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .titlebar {
    background: rgba(255, 215, 0, 0.08);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,215,0,0.15);
    flex-shrink: 0;
    cursor: grab;
    -webkit-app-region: drag;
  }

  .titlebar-left {
    display: flex;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }

  .lang-badge {
    background: rgba(255,215,0,0.15);
    color: #FFD700;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
  }

  /* Badge hiển thị model đang dùng */
  .model-badge {
    padding: 2px 7px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 500;
    background: rgba(100,180,255,0.12);
    color: #64b4ff;
  }
  .model-badge.google { background: rgba(100,220,130,0.12); color: #64dc82; }
  .model-badge.lite   { background: rgba(180,140,255,0.12); color: #b48cff; }
  .model-badge.cache  { background: rgba(255,180,50,0.12);  color: #ffb432; }

  .titlebar-right {
    display: flex;
    gap: 6px;
    -webkit-app-region: no-drag;
  }

  .btn-icon {
    background: rgba(255,255,255,0.07);
    border: none; color: #a0a8c0;
    width: 24px; height: 24px;
    border-radius: 6px; cursor: pointer;
    font-size: 13px; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-pin.pinned { color: #FFD700; background: rgba(255,215,0,0.15); }

  .content { flex: 1; overflow-y: auto; padding: 12px 14px; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 2px; }

  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 12px;
    color: #607090; font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(255,215,0,0.15);
    border-top-color: #FFD700;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section { margin-bottom: 12px; }
  .section-label { font-size: 10px; color: #3a4060; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

  .original-text {
    font-size: 12px; color: #607090; line-height: 1.7;
    font-family: 'Yu Gothic', 'Noto Sans CJK JP', monospace;
    background: rgba(255,255,255,0.03);
    padding: 8px 10px; border-radius: 6px;
    border-left: 2px solid rgba(255,255,255,0.08);
  }

  .translated-text {
    font-size: 14px; color: #FFD700; line-height: 1.8;
    background: rgba(255,215,0,0.05);
    padding: 10px 12px; border-radius: 6px;
    border-left: 2px solid rgba(255,215,0,0.3);
  }

  .error-box {
    background: rgba(239,83,80,0.1);
    border: 1px solid rgba(239,83,80,0.2);
    border-radius: 8px; padding: 12px;
    color: #ef9a9a; font-size: 13px; line-height: 1.6;
  }

  .footer {
    padding: 7px 14px;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .hint-text { font-size: 10px; color: #2a3050; }
  .btn-copy {
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.2);
    color: #FFD700; padding: 3px 10px;
    border-radius: 6px; cursor: pointer; font-size: 11px;
    transition: background 0.15s; display: none;
  }
  .btn-copy:hover { background: rgba(255,215,0,0.2); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="titlebar" id="titlebar">
  <div class="titlebar-left">
    🌐 Screen Translator
    <span class="lang-badge" id="lang-badge">JA → VI</span>
    <span class="model-badge" id="model-badge">...</span>
  </div>
  <div class="titlebar-right">
    <button class="btn-icon btn-pin" id="btn-pin" onclick="togglePin()" title="Ghim vị trí">📌</button>
    <button class="btn-icon" onclick="closeWindow()" title="Đóng">✕</button>
  </div>
</div>

<div class="content" id="content">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    <span>Đang nhận diện & dịch...</span>
  </div>
  <div id="result-state" class="hidden">
    <div class="section">
      <div class="section-label">Văn bản gốc</div>
      <div class="original-text" id="original-text"></div>
    </div>
    <div class="section">
      <div class="section-label">Bản dịch</div>
      <div class="translated-text" id="translated-text"></div>
    </div>
  </div>
  <div id="error-state" class="hidden">
    <div class="error-box" id="error-msg"></div>
  </div>
</div>

<div class="footer">
  <span class="hint-text">F2: Dịch vùng mới &nbsp;·&nbsp; F5: Đổi VI/EN &nbsp;·&nbsp; 📌 Ghim</span>
  <button class="btn-copy" id="copy-btn" onclick="copyTranslation()">📋 Copy</button>
</div>

<script>
const { ipcRenderer, clipboard } = require('electron');

const loadingState   = document.getElementById('loading-state');
const resultState    = document.getElementById('result-state');
const errorState     = document.getElementById('error-state');
const originalText   = document.getElementById('original-text');
const translatedText = document.getElementById('translated-text');
const errorMsg       = document.getElementById('error-msg');
const langBadge      = document.getElementById('lang-badge');
const modelBadge     = document.getElementById('model-badge');
const copyBtn        = document.getElementById('copy-btn');
const btnPin         = document.getElementById('btn-pin');

let lastTranslation = '';
let isPinned = false;

ipcRenderer.on('show-result', (event, data) => {
    // Reset states
    loadingState.classList.add('hidden');
    resultState.classList.add('hidden');
    errorState.classList.add('hidden');
    copyBtn.style.display = 'none';

    if (data.status === 'loading') {
        loadingState.classList.remove('hidden');
        return;
    }

    if (data.status === 'error' || (data.errorMessage && !data.translatedText)) {
        errorState.classList.remove('hidden');
        errorMsg.textContent = '⚠️ ' + (data.message || data.errorMessage);
        return;
    }

    // Hiển thị kết quả dịch
    resultState.classList.remove('hidden');

    // Cập nhật lang badge
    const srcLang = getLangLabel(data.detectedSourceLang);
    const tgtLang = data.targetLang === 'vi' ? '🇻🇳 VI' : '🇺🇸 EN';
    langBadge.textContent = `${srcLang} → ${tgtLang}`;

    // Cập nhật model badge
    const model = data.modelUsed || '';
    if (model.includes('cache')) {
        modelBadge.textContent = '⚡ Cache';
        modelBadge.className = 'model-badge cache';
    } else if (model.includes('2.5')) {
        modelBadge.textContent = '✦ 2.5 Flash';
        modelBadge.className = 'model-badge';
    } else if (model.includes('3.1') || model.includes('lite')) {
        modelBadge.textContent = '⚡ 3.1 Lite';
        modelBadge.className = 'model-badge lite';
    } else if (model.includes('google')) {
        modelBadge.textContent = '🔄 Google';
        modelBadge.className = 'model-badge google';
    } else {
        modelBadge.textContent = model || 'AI';
        modelBadge.className = 'model-badge';
    }

    // Hiển thị text
    originalText.innerHTML  = escapeHtml(data.originalText  || '').replace(/\n/g, '<br>');
    translatedText.innerHTML = escapeHtml(data.translatedText || '').replace(/\n/g, '<br>');

    lastTranslation = data.translatedText || '';
    copyBtn.style.display = lastTranslation ? 'block' : 'none';

    // Auto resize
    setTimeout(() => {
        const h = Math.min(Math.max(document.getElementById('content').scrollHeight + 80, 150), 500);
        ipcRenderer.send('resize-result', { width: 420, height: h });
    }, 50);
});

function togglePin() {
    isPinned = !isPinned;
    btnPin.classList.toggle('pinned', isPinned);
    ipcRenderer.send('set-pinned', isPinned);
}

function closeWindow() { ipcRenderer.send('close-result'); }

function copyTranslation() {
    if (lastTranslation) {
        clipboard.writeText(lastTranslation);
        copyBtn.textContent = '✓ Đã copy!';
        setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 1500);
    }
}

function getLangLabel(lang) {
    const map = { 'ja':'🇯🇵 JA', 'zh':'🇨🇳 ZH', 'zh-CN':'🇨🇳 ZH', 'zh-TW':'🇹🇼 ZH', 'en':'🇬🇧 EN', 'ko':'🇰🇷 KO' };
    return map[lang] || '🌐 AUTO';
}

function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
