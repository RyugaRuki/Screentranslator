server.port=8080

# =====================================================
# GEMINI API - Miễn phí 15 req/phút, 1500 req/ngày
# Tạo key MỚI tại: https://aistudio.google.com/apikey
# (Key cũ đã hết quota do test nhiều - xóa key cũ, tạo key mới)
# =====================================================
gemini.api.key=

# Google Translate fallback (để trống = dùng unofficial miễn phí)
google.translate.api.key=

# ---- Tesseract OCR ----
# QUAN TRỌNG: Chỉ điền ngôn ngữ có file .traineddata trong tessdata folder
# Kiểm tra: dir "C:\Program Files\Tesseract-OCR\tessdata\*.traineddata"
# Chỉ cài jpn → dùng: jpn+eng
# Cài thêm chi_sim → dùng: jpn+chi_sim+eng
tesseract.data.path=C:/Program Files/Tesseract-OCR/tessdata
tesseract.languages=jpn+eng

# ---- Cache ----
cache.ttl.minutes=30
cache.max.size=1000

# ---- Logging ----
logging.level.com.translator=INFO
logging.level.root=WARN
